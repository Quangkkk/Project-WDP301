<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu — TechHome</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">T</span> Tech<em>Home</em></a>
    </div>
  </header>
  <div class="auth-layout">
    <div class="auth-panel-left">
      <h2>Forgot password</h2>
      <p class="text-muted">Use case: <strong>Forgot your password</strong> (User, Admin)</p>
    </div>
    <div class="auth-form-panel">
      <form class="auth-form">
        <h1>Quên mật khẩu</h1>
        <p class="subtitle">Nhập email để nhận link đặt lại mật khẩu</p>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" required></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Gửi link</button>
        <p class="text-center text-small mt-4"><a href="login.html">← Sign in</a></p>
      </form>
    </div>
  </div>
</body>
</html>
