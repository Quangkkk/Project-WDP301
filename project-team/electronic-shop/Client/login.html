<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — TechHome</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></span> Tech<em>Home</em></a>
    </div>
  </header>

  <main class="auth-layout auth-layout--center">
    <div class="auth-card">
      <form class="auth-form" action="profile.html">
        <h1>Đăng nhập</h1>
        <p class="subtitle">Guest đăng nhập để trở thành User</p>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Mật khẩu</label><input type="password" class="form-input" required></div>
        <p class="text-small mb-4"><a href="forgot-password.html" style="color:var(--blue)">Forgot password?</a></p>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        <p class="text-center text-small text-muted mt-4">Chưa có tài khoản? <a href="register.html" style="color:var(--blue)">Đăng ký</a></p>
        <p class="text-center text-small mt-4"><a href="admin.html" class="text-muted">Admin login →</a></p>
      </form>
    </div>
  </main>
</body>
</html>
